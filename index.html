<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Mk7 Autosave</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #dbeafe;
      --link: #2563eb;
      --link-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 36%),
        var(--bg);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      padding: 32px 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--link);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    a:hover {
      background: var(--link-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Editor Mk7 Autosave</h1>
    <p>点击下面的链接，在新页面中打开主编辑器。</p>
    <a href="./editor-mk7-autosave.html" target="_blank" rel="noopener noreferrer">
      打开主页面
    </a>
  </main>
</body>
</html>
