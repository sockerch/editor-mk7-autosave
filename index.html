<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Mk7 Autosave</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e9eef7;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.9);
      --panel: rgba(255, 255, 255, 0.14);
      --panel-line: rgba(255, 255, 255, 0.16);
      --link: #ffffff;
      --button-bg: rgba(15, 23, 42, 0.22);
      --button-hover: rgba(15, 23, 42, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      width: min(1980px, 100%);
      margin: 0 auto;
      padding: 26px 30px 28px;
      border-radius: 28px;
      background: linear-gradient(135deg, #182b63, #264ed2 60%, #42b0eb);
      box-shadow: 0 22px 50px rgba(38, 78, 210, 0.22);
    }

    .intro-card {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
      gap: 22px;
      align-items: start;
    }

    .intro-copy h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 3vw, 54px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .intro-copy p {
      max-width: 18em;
      margin: 0;
      font-size: clamp(16px, 1.15vw, 20px);
      line-height: 1.8;
      color: var(--muted);
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .feature-pill {
      padding: 18px 20px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--panel-line);
      backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .feature-pill strong {
      display: block;
      margin-bottom: 8px;
      font-size: clamp(18px, 1.2vw, 24px);
      line-height: 1.3;
    }

    .feature-pill span {
      display: block;
      font-size: clamp(14px, 0.95vw, 18px);
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.85);
    }

    .hero-actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-start;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--link);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .open-link:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    @media (max-width: 980px) {
      body {
        padding: 12px;
      }

      .hero {
        padding: 22px 18px 24px;
        border-radius: 22px;
      }

      .intro-card {
        grid-template-columns: 1fr;
      }

      .intro-copy p {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .feature-list {
        grid-template-columns: 1fr;
      }

      .open-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <section class="intro-card">
      <div class="intro-copy">
        <h1>Editor Mk7 Autosave</h1>
        <p>
          一个偏实用的单文件 Markdown 编辑器：保留原始图片格式、支持撤销重做，
          同时内置面向长文写作的自动保存机制，尽量把“突然关闭页面”这类损失降到最低。
        </p>
      </div>
      <div class="feature-list">
        <article class="feature-pill">
          <strong>智能节流保存</strong>
          <span>停止输入 2 秒后自动保存</span>
        </article>
        <article class="feature-pill">
          <strong>定时保存</strong>
          <span>每 30 秒自动保存一次</span>
        </article>
        <article class="feature-pill">
          <strong>多版本管理</strong>
          <span>最多保留 3 个自动保存版本</span>
        </article>
        <article class="feature-pill">
          <strong>草稿恢复</strong>
          <span>24 小时内自动恢复未保存的草稿</span>
        </article>
        <article class="feature-pill">
          <strong>状态指示</strong>
          <span>右上角实时显示自动保存状态</span>
        </article>
        <article class="feature-pill">
          <strong>错误处理</strong>
          <span>存储空间不足时自动清理旧数据</span>
        </article>
      </div>
    </section>

    <div class="hero-actions">
      <a class="open-link" href="./editor-mk7-autosave.html" target="_blank" rel="noopener noreferrer">
        点击这里，在新页面打开主页面
      </a>
    </div>
  </main>
</body>
</html>
